<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程計畫 HTML 檢視與連結設定工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        iframe { border: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- 控制面板 -->
    <div class="bg-white shadow-md z-10">
        <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-2xl font-bold text-gray-800">📄 課程計畫 HTML 檢視與美化工具</h1>
                <button id="toggleSettingsBtn" class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-800 bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-md transition-colors">
                    <span id="toggleArrow" class="inline-block transition-transform duration-200 text-xs">▼</span>
                    <span id="toggleLabel">收合設定</span>
                </button>
            </div>
            <div id="settingsPanel">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-blue-50 p-5 rounded-lg border border-blue-100">

                <!-- 步驟 1：連結設定 -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">
                        1. 設定基礎網址 (Google Apps Script)
                    </label>
                    <input type="text" id="baseUrl"
                           placeholder="例如: https://script.google.com/.../exec"
                           class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 shadow-sm text-sm">
                </div>

                <!-- 步驟 2：檔案上傳 -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">
                        2. 上傳從 Word 存出的網頁檔
                    </label>
                    <div class="flex items-center gap-2">
                        <input type="file" id="fileInput" accept=".htm,.html"
                               class="block w-full text-sm text-gray-500
                                      file:mr-2 file:py-2 file:px-4
                                      file:rounded-md file:border-0
                                      file:text-sm file:font-semibold
                                      file:bg-blue-600 file:text-white
                                      hover:file:bg-blue-700 cursor-pointer">
                        <select id="encoding" class="border border-gray-300 text-sm rounded-md px-2 py-2">
                            <option value="big5">Big5</option>
                            <option value="utf-8">UTF-8</option>
                        </select>
                    </div>
                </div>

                <!-- 步驟 3：樣式選擇與執行 -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">
                        3. 選擇表格美化風格
                    </label>
                    <div class="flex items-center gap-2">
                        <select id="themeSelect" class="w-full border border-gray-300 text-sm rounded-md px-3 py-2">
                            <optgroup label="── 單色系 ──">
                                <option value="blue">🟦 專業藍（推薦）</option>
                                <option value="green">🟩 典雅綠</option>
                                <option value="orange">🟧 溫暖橘</option>
                                <option value="red">🟥 活力紅</option>
                                <option value="purple">🟪 柔和紫</option>
                                <option value="teal">🩵 清新青</option>
                            </optgroup>
                            <optgroup label="── 專業版 ──">
                                <option value="pro-gradient">✨ 漸層藍（商務）</option>
                                <option value="pro-dark">🌑 夜幕深色</option>
                            </optgroup>
                            <optgroup label="── 活潑版 ──">
                                <option value="fun-coral">🌸 珊瑚活力</option>
                                <option value="fun-mint">🌿 薄荷清新</option>
                                <option value="fun-yellow">☀️ 陽光黃</option>
                            </optgroup>
                            <optgroup label="── 其他 ──">
                                <option value="none">⚪ 保留 Word 原始樣式</option>
                            </optgroup>
                        </select>
                        <button id="renderBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-6 rounded-md shadow transition duration-150 whitespace-nowrap">
                            套用並顯示
                        </button>
                    </div>
                </div>

            </div>

            <!-- 步驟 4：網頁標題 -->
            <div class="mt-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <label class="block text-sm font-bold text-gray-700 mb-2">
                    4. 網頁標題（自動讀取，可修改後套用）
                </label>
                <input type="text" id="titleInput" placeholder="選擇檔案後自動讀取原始標題..."
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 shadow-sm text-sm">
            </div>
            </div><!-- /settingsPanel -->

            <!-- 動作面板 -->
            <div id="actionPanel" class="mt-4 hidden flex items-center gap-4 bg-green-50 p-4 rounded-md border border-green-200">
                <span class="text-green-800 font-medium flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    處理成功！您可以：
                </span>
                <a id="openTabBtn" href="#" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-2 px-4 rounded shadow transition duration-150">
                    ↗️ 另開視窗全螢幕瀏覽
                </a>
                <a id="downloadBtn" href="#" download="調整後的課程計畫首頁.html" class="bg-gray-800 hover:bg-gray-900 text-white text-sm font-bold py-2 px-4 rounded shadow transition duration-150">
                    💾 下載處理後的網頁
                </a>
                <!-- 右側調整控制列 -->
                <div class="ml-auto flex flex-col gap-1.5 border-l border-green-300 pl-4">
                    <div class="flex items-center gap-2">
                        <span class="text-gray-600 text-xs font-medium w-8 shrink-0">標題：</span>
                        <button id="headingDecBtn" class="bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-bold py-0.5 px-2.5 rounded shadow-sm text-sm">A－</button>
                        <span id="headingSizeDisplay" class="text-xs font-mono w-12 text-center border border-gray-200 bg-white rounded py-0.5">16px</span>
                        <button id="headingIncBtn" class="bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-bold py-0.5 px-2.5 rounded shadow-sm text-sm">A＋</button>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-gray-600 text-xs font-medium w-8 shrink-0">內文：</span>
                        <button id="bodyDecBtn" class="bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-bold py-0.5 px-2.5 rounded shadow-sm text-sm">A－</button>
                        <span id="bodySizeDisplay" class="text-xs font-mono w-12 text-center border border-gray-200 bg-white rounded py-0.5">14px</span>
                        <button id="bodyIncBtn" class="bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-bold py-0.5 px-2.5 rounded shadow-sm text-sm">A＋</button>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-gray-600 text-xs font-medium w-8 shrink-0">行高：</span>
                        <button id="rowHeightDecBtn" class="bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-bold py-0.5 px-2.5 rounded shadow-sm text-sm">矮－</button>
                        <span id="rowHeightDisplay" class="text-xs font-mono w-12 text-center border border-gray-200 bg-white rounded py-0.5">8px</span>
                        <button id="rowHeightIncBtn" class="bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-bold py-0.5 px-2.5 rounded shadow-sm text-sm">高＋</button>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-gray-600 text-xs font-medium w-8 shrink-0">格線：</span>
                        <button id="borderDecBtn" class="bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-bold py-0.5 px-2.5 rounded shadow-sm text-sm">細－</button>
                        <span id="borderWidthDisplay" class="text-xs font-mono w-12 text-center border border-gray-200 bg-white rounded py-0.5">1px</span>
                        <button id="borderIncBtn" class="bg-white border border-gray-300 hover:bg-gray-100 text-gray-800 font-bold py-0.5 px-2.5 rounded shadow-sm text-sm">粗＋</button>
                        <input type="color" id="borderColorPicker" value="#d1d5db" title="格線顏色" class="w-7 h-7 rounded cursor-pointer border border-gray-300 p-0">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 預覽畫面區 -->
    <div class="flex-grow w-full relative bg-white">
        <div id="placeholder" class="absolute inset-0 flex items-center justify-center text-gray-400 flex-col">
            <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <p class="text-lg">請完成上方三個步驟，並點擊「套用並顯示」</p>
        </div>
        <iframe id="previewFrame" class="w-full h-full absolute inset-0 hidden"></iframe>
    </div>

                tr:nth-child(even):not(:first-child) td:not(.theme-header-cell) { background-color:#ecfdf5 !important; }
                tr:hover:not(:first-child) td:not(.theme-header-cell) { background-color:#d1fae5 !important; }
                a { color:#059669 !important; text-decoration:none !important; font-weight:bold !important; }
                a:hover { text-decoration:underline !important; color:#047857 !important; }
                td.theme-header-cell { background-color:#059669 !important; color:#fff !important; font-weight:bold !important; }
                td.theme-header-cell * { color:#fff !important; }
            `,
            'fun-yellow': `
                body { font-family:'Noto Sans TC',sans-serif !important; padding:20px; background:#fffbeb; color:#333; line-height:1.6; overflow-x:hidden; }
                table { width:100% !important; border-collapse:collapse !important; background:#fff; margin-bottom:20px; box-shadow:0 2px 10px rgba(245,158,11,0.15); border-radius:12px; overflow:hidden; word-wrap:break-word; border:2px solid #fcd34d !important; }
                td, th { padding:8px 12px !important; border:1px solid #fcd34d !important; text-align:left; word-break:break-word; overflow-wrap:break-word; line-height:1.6; }
                tr:first-child td, thead td, th { background-color:#d97706 !important; color:#fff !important; font-weight:bold !important; }
                tr:first-child p, tr:first-child span { color:#fff !important; }
                tr:nth-child(even):not(:first-child) td:not(.theme-header-cell) { background-color:#fffbeb !important; }
                tr:hover:not(:first-child) td:not(.theme-header-cell) { background-color:#fef3c7 !important; }
                a { color:#b45309 !important; text-decoration:none !important; font-weight:bold !important; }
                a:hover { text-decoration:underline !important; color:#92400e !important; }
                td.theme-header-cell { background-color:#d97706 !important; color:#fff !important; font-weight:bold !important; }
                td.theme-header-cell * { color:#fff !important; }
            `
        };

        // ═══════════════════════════════════════════════════
        // 狀態變數
        // ═══════════════════════════════════════════════════
        let previousObjectUrl = null;
        let baseHtmlForDownload = null;

        // 字型大小
        const HEADING_SIZES = [12, 13, 14, 15, 16, 18, 20, 22, 24, 28];
        const BODY_SIZES    = [10, 11, 12, 13, 14, 15, 16, 18, 20, 22];
        let headingIdx = 4;
        let bodyIdx    = 4;

        // 行高（垂直 padding）
        const ROW_PADDINGS = [2, 4, 6, 8, 10, 12, 16, 20, 24];
        let rowPaddingIdx = 3; // 預設 8px
        let rowHeightCtrlActive = false;

        // 格線
        const BORDER_WIDTHS = [0.5, 1, 1.5, 2, 3];
        let borderWidthIdx = 1;
        let borderColor = '#d1d5db';
        let borderCtrlActive = false;

        // ═══════════════════════════════════════════════════
        // CSS 產生函式
        // ═══════════════════════════════════════════════════
        function getFontCtrlCSS() {
            const h = HEADING_SIZES[headingIdx];
            const b = BODY_SIZES[bodyIdx];
            return `
                th, tr:first-child td, td.theme-header-cell, h1, h2, h3, h4, h5, h6,
                .theme-page-title, .theme-page-title * { font-size:${h}px !important; }
                td:not(.theme-header-cell), p:not(.theme-page-title), li, span:not(.theme-page-title *),
                div:not(.theme-page-title) { font-size:${b}px !important; }
            `;
        }

        function getRowHeightCSS() {
            if (!rowHeightCtrlActive) return '';
            const p = ROW_PADDINGS[rowPaddingIdx];
            return `td, th { padding-top:${p}px !important; padding-bottom:${p}px !important; }`;
        }

        function getBorderCtrlCSS() {
            if (!borderCtrlActive) return '';
            const w = BORDER_WIDTHS[borderWidthIdx];
            const c = borderColor;
            return `table { border:${w}px solid ${c} !important; } td, th { border:${w}px solid ${c} !important; }`;
        }

        function updateDownloadBlob() {
            if (!baseHtmlForDownload) return;
            if (previousObjectUrl) URL.revokeObjectURL(previousObjectUrl);
            const html = baseHtmlForDownload.replace('</head>',
                `<style id="__font-ctrl__">${getFontCtrlCSS()}</style>\n` +
                `<style id="__row-height-ctrl__">${getRowHeightCSS()}</style>\n` +
                `<style id="__border-ctrl__">${getBorderCtrlCSS()}</style>\n</head>`);
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const objectUrl = URL.createObjectURL(blob);
            previousObjectUrl = objectUrl;
            document.getElementById('openTabBtn').href = objectUrl;
            document.getElementById('downloadBtn').href = objectUrl;
        }

        // 更新 iframe 內的 style 標籤
        function updateIframeStyle(id, css) {
            const iframe = document.getElementById('previewFrame');
            if (!iframe.contentDocument || !iframe.contentDocument.head) return;
            let el = iframe.contentDocument.getElementById(id);
            if (!el) {
                el = iframe.contentDocument.createElement('style');
                el.id = id;
                iframe.contentDocument.head.appendChild(el);
            }
            el.innerHTML = css;
        }

        // ═══════════════════════════════════════════════════
        // 套用函式
        // ═══════════════════════════════════════════════════
        function applyFontSize() {
            document.getElementById('headingSizeDisplay').textContent = HEADING_SIZES[headingIdx] + 'px';
            document.getElementById('bodySizeDisplay').textContent    = BODY_SIZES[bodyIdx] + 'px';
            updateIframeStyle('__font-ctrl__', getFontCtrlCSS());
            updateDownloadBlob();
        }

        function applyRowHeight() {
            rowHeightCtrlActive = true;
            document.getElementById('rowHeightDisplay').textContent = ROW_PADDINGS[rowPaddingIdx] + 'px';
            updateIframeStyle('__row-height-ctrl__', getRowHeightCSS());
            updateDownloadBlob();
        }

        function applyBorderStyle() {
            borderCtrlActive = true;
            document.getElementById('borderWidthDisplay').textContent = BORDER_WIDTHS[borderWidthIdx] + 'px';
            updateIframeStyle('__border-ctrl__', getBorderCtrlCSS());
            updateDownloadBlob();
        }

        // ═══════════════════════════════════════════════════
        // 主渲染邏輯
        // ═══════════════════════════════════════════════════
        document.getElementById('renderBtn').addEventListener('click', () => {
            const fileInput  = document.getElementById('fileInput');
            let rawBaseUrl   = document.getElementById('baseUrl').value.trim();
            const encoding   = document.getElementById('encoding').value;
            const theme      = document.getElementById('themeSelect').value;
            const iframe     = document.getElementById('previewFrame');
            const placeholder= document.getElementById('placeholder');
            const actionPanel= document.getElementById('actionPanel');

            if (fileInput.files.length === 0) {
                alert('請先選擇 .htm 或 .html 檔案！');
                return;
            }

            const file   = fileInput.files[0];
            const reader = new FileReader();

            let cleanBaseUrl = rawBaseUrl;
            if (cleanBaseUrl.includes('?')) cleanBaseUrl = cleanBaseUrl.split('?')[0];

            reader.onload = function(e) {
                const parser = new DOMParser();
                const doc    = parser.parseFromString(e.target.result, 'text/html');

                // 1. 處理超連結
                doc.querySelectorAll('a').forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('http') && !href.startsWith('mailto:') &&
                        !href.startsWith('#') && !href.startsWith('data:')) {
                        if (cleanBaseUrl) {
                            let norm = href.replace(/\\/g, '/');
                            try { norm = decodeURIComponent(norm); } catch(e) {}
                            const parts  = norm.split('/');
                            const fn     = parts.pop();
                            const folder = parts.join('/');
                            let newHref  = cleanBaseUrl + '?';
                            if (folder) newHref += 'folder=' + encodeURIComponent(folder) + '&';
                            newHref += 'file=' + encodeURIComponent(fn);
                            link.setAttribute('href', newHref);
                        }
                        link.setAttribute('target', '_blank');
                    }
                });

                // 2. Google 字體
                if (!doc.head.querySelector('link[href*="fonts.googleapis.com"]')) {
                    const fl = doc.createElement('link');
                    fl.rel  = 'stylesheet';
                    fl.href = 'https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap';
                    doc.head.appendChild(fl);
                }

                // 3a. 移除固定寬高，響應式（所有主題）
                doc.querySelectorAll('table, col, colgroup').forEach(el => {
                    el.removeAttribute('width');
                    if (el.style) { el.style.width = ''; el.style.minWidth = ''; }
                });
                doc.querySelectorAll('td, th').forEach(el => {
                    el.removeAttribute('width');
                    if (el.style) { el.style.width = ''; el.style.minWidth = ''; el.style.maxWidth = ''; }
                });
                doc.querySelectorAll('tr').forEach(el => {
                    el.removeAttribute('height');
                    if (el.style) el.style.height = '';
                });
                const baseRespStyle = doc.createElement('style');
                baseRespStyle.innerHTML = `body{overflow-x:hidden;} table{width:100% !important;word-wrap:break-word;} td,th{word-break:break-word;overflow-wrap:break-word;}`;
                doc.head.appendChild(baseRespStyle);

                // 3b. 注入主題 CSS + 標題格偵測（非 none 主題）
                if (theme !== 'none') {
                    doc.querySelectorAll('td, th, tr').forEach(el => {
                        el.removeAttribute('bgcolor');
                        if (el.style) { el.style.backgroundColor = ''; el.style.background = ''; }
                    });

                    const styleTag = doc.createElement('style');
                    styleTag.innerHTML = themes[theme];
                    doc.head.appendChild(styleTag);

                    // A~L 開頭欄位標記為 theme-header-cell，同列格子一起補色
                    doc.querySelectorAll('table').forEach(table => {
                        table.querySelectorAll('tr').forEach((row, i) => {
                            if (i === 0) return;

                            for (let j = 0; j < row.cells.length; j++) {
                                const cell    = row.cells[j];
                                if (!cell) continue;
                                const rawText = cell.textContent || '';
                                const match   = rawText.match(/[0-9０-９a-zA-Z一-龥Ａ-Ｚａ-ｚ]/);
                                if (!match) continue;

                                const firstChar = match[0];
                                const index     = match.index;
                                const isLetter  = /^[a-zA-ZＡ-Ｚａ-ｚ]$/.test(firstChar);
                                if (!isLetter) continue;

                                let checkChar = firstChar.toUpperCase();
                                if (checkChar >= 'Ａ' && checkChar <= 'Ｚ') {
                                    checkChar = String.fromCharCode(checkChar.charCodeAt(0) - 0xFEE0);
                                }
                                if (checkChar < 'A' || checkChar > 'L') continue;

                                const restText    = rawText.substring(index + 1);
                                const trimmedRest = restText.trim();

                                // 排除 f-1, g-1 等子項目
                                if (/^[-－_.]\s*\d/.test(trimmedRest)) continue;
                                // 排除「E化教學」等誤判
                                if (/^化/.test(trimmedRest)) continue;

                                let isTitle = (trimmedRest.length === 0);
                                if (!isTitle) {
                                    const nc = restText.match(/[^\s -⁯﻿　\xA0]/);
                                    if (nc && !/^[a-zA-Z0-9Ａ-Ｚａ-ｚ０-９]$/.test(nc[0])) {
                                        isTitle = true;
                                    } else if (!nc) {
                                        isTitle = true;
                                    }
                                }

                                if (isTitle && rawText.length < 200) {
                                    cell.classList.add('theme-header-cell');
                                }
                            }

                            // 同列有任何標題格 → 整列補深色
                            if (Array.from(row.cells).some(c => c.classList.contains('theme-header-cell'))) {
                                Array.from(row.cells).forEach(c => c.classList.add('theme-header-cell'));
                            }
                        });
                    });
                }

                // 3c. 偵測頁面主標題
                doc.querySelectorAll('p, h1, h2, h3, h4, h5, h6, div').forEach(el => {
                    if (el.closest('table')) return;
                    const txt = el.textContent.trim();
                    if (txt.length > 0 && txt.length < 80 &&
                        (txt.includes('學年度') || txt.includes('課程計畫')) &&
                        (txt.includes('國民小學') || txt.includes('國中') || txt.includes('高中') ||
                         txt.includes('學校') || txt.includes('總體'))) {
                        el.classList.add('theme-page-title');
                    }
                });

                // 4. 自訂標題
                const customTitle = document.getElementById('titleInput').value.trim();
                if (customTitle) doc.title = customTitle;

                // 4b. 儲存基底 HTML
                const mc = doc.createElement('meta');
                mc.setAttribute('charset', 'UTF-8');
                doc.head.insertBefore(mc, doc.head.firstChild);
                baseHtmlForDownload = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;

                // 4c. 注入動態控制 style 佔位（初始空白）
                // 字型
                const fontSizeStyle = doc.createElement('style');
                fontSizeStyle.id    = '__font-ctrl__';
                fontSizeStyle.innerHTML = getFontCtrlCSS();
                doc.head.appendChild(fontSizeStyle);

                // 行高 — 重設
                rowHeightCtrlActive = false;
                rowPaddingIdx = 3;
                document.getElementById('rowHeightDisplay').textContent = ROW_PADDINGS[rowPaddingIdx] + 'px';
                const rowHStyle = doc.createElement('style');
                rowHStyle.id    = '__row-height-ctrl__';
                rowHStyle.innerHTML = '';
                doc.head.appendChild(rowHStyle);

                // 格線 — 重設
                borderCtrlActive = false;
                borderWidthIdx   = 1;
                borderColor      = '#d1d5db';
                document.getElementById('borderColorPicker').value = borderColor;
                document.getElementById('borderWidthDisplay').textContent = BORDER_WIDTHS[borderWidthIdx] + 'px';
                const borderStyle = doc.createElement('style');
                borderStyle.id    = '__border-ctrl__';
                borderStyle.innerHTML = '';
                doc.head.appendChild(borderStyle);

                // 5. 更新 iframe
                iframe.srcdoc = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
                placeholder.classList.add('hidden');
                iframe.classList.remove('hidden');

                // 6. Blob URL
                updateDownloadBlob();
                actionPanel.classList.remove('hidden');
            };

            reader.readAsText(file, encoding);
        });

        // 選擇檔案時自動讀取標題
        document.getElementById('fileInput').addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const doc = new DOMParser().parseFromString(e.target.result, 'text/html');
                if (doc.title) document.getElementById('titleInput').value = doc.title;
            };
            reader.readAsText(file, document.getElementById('encoding').value);
        });

        // ═══════════════════════════════════════════════════
        // 事件監聽
        // ═══════════════════════════════════════════════════
        document.getElementById('headingDecBtn').addEventListener('click', () => { if (headingIdx > 0) { headingIdx--; applyFontSize(); } });
        document.getElementById('headingIncBtn').addEventListener('click', () => { if (headingIdx < HEADING_SIZES.length-1) { headingIdx++; applyFontSize(); } });
        document.getElementById('bodyDecBtn').addEventListener('click',    () => { if (bodyIdx > 0) { bodyIdx--; applyFontSize(); } });
        document.getElementById('bodyIncBtn').addEventListener('click',    () => { if (bodyIdx < BODY_SIZES.length-1) { bodyIdx++; applyFontSize(); } });

        document.getElementById('rowHeightDecBtn').addEventListener('click', () => { if (rowPaddingIdx > 0) { rowPaddingIdx--; applyRowHeight(); } });
        document.getElementById('rowHeightIncBtn').addEventListener('click', () => { if (rowPaddingIdx < ROW_PADDINGS.length-1) { rowPaddingIdx++; applyRowHeight(); } });

        document.getElementById('borderDecBtn').addEventListener('click',   () => { if (borderWidthIdx > 0) { borderWidthIdx--; applyBorderStyle(); } });
        document.getElementById('borderIncBtn').addEventListener('click',   () => { if (borderWidthIdx < BORDER_WIDTHS.length-1) { borderWidthIdx++; applyBorderStyle(); } });
        document.getElementById('borderColorPicker').addEventListener('input', (e) => { borderColor = e.target.value; applyBorderStyle(); });

        // 收合設定面板
        document.getElementById('toggleSettingsBtn').addEventListener('click', () => {
            const panel   = document.getElementById('settingsPanel');
            const arrow   = document.getElementById('toggleArrow');
            const label   = document.getElementById('toggleLabel');
            const visible = !panel.classList.contains('hidden');
            panel.classList.toggle('hidden', visible);
            arrow.style.transform = visible ? 'rotate(-90deg)' : '';
            label.textContent     = visible ? '展開設定' : '收合設定';
        });
    </script>
</body>
</html>
